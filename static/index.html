<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirSplice — Multi-Channel Audio Recorder</title>
  <link rel="stylesheet" href="{{.BasePath}}/static/style.css" />
</head>
<body>
  <header>
    <h1>🎙 AirSplice</h1>
    <p class="subtitle">Multi-Channel Audio Recorder</p>
    <div id="auth-bar"></div>
  </header>

  <main>
    <section id="channels-section">
      <h2>Channels</h2>
      <div id="channels-grid"></div>
    </section>

    <section id="recordings-section">
      <h2>Recordings</h2>
      <div id="filter-bar">
        <label>Filter by channel:
          <select id="label-filter"><option value="">All</option></select>
        </label>
        <button id="refresh-btn">↻ Refresh</button>
      </div>
      <div id="recordings-list"></div>
      <div id="pagination">
        <button id="prev-btn" disabled>← Prev</button>
        <span id="page-info"></span>
        <button id="next-btn" disabled>Next →</button>
      </div>
    </section>
  </main>

  <div id="login-modal" class="modal hidden">
    <div class="modal-box">
      <h3>Enter Password</h3>
      <input type="password" id="login-password" placeholder="Password" />
      <div class="modal-actions">
        <button id="login-submit">Login</button>
        <button id="login-cancel">Cancel</button>
      </div>
      <p id="login-error" class="error hidden"></p>
    </div>
  </div>

  <script>
    window.BASE_PATH = "{{.BasePath}}";
  </script>
  <script src="{{.BasePath}}/static/app.js"></script>
</body>
</html>
