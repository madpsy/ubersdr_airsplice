services:
  ubersdr_airsplice:
    image: madpsy/ubersdr_airsplice:latest
    container_name: airsplice
    restart: unless-stopped
    cpu_shares: 512
    environment:
      # UberSDR WebSocket URL
      UBERSDR_URL: "ws://ubersdr:8080/ws"
      #
      # Channels are managed via the web UI and persisted to /data/channels.json.
      # No UBERSDR_CHANNELS env var is needed.
      #
      # Uncomment and set as needed:
      # UBERSDR_PASS: ""
      # UI_PASSWORD: ""          # Set to enable password-protected write actions in the web UI
      OUTPUT_DIR: "/data"
      # WEB_PORT: "6095"
      # SEGMENT_SECS: "300"      # Rotate to a new WAV file every N seconds (0 = continuous)
      # CLEANUP_ALL_DAYS: "30"   # Delete ALL recordings older than N days (0=disabled)
      MAX_STORAGE_MB: "20480"    # Maximum total storage in MB (20 GB); 0 = unlimited. Per-channel limits set via web UI.
    networks:
      - sdr-network
    volumes:
      - ./recordings:/data
    logging:
      driver: "fluentd"
      options:
        fluentd-address: "127.0.0.1:24224"
        fluentd-async: "true"
        tag: "airsplice"

networks:
  sdr-network:
    external: true
    name: ubersdr_sdr-network
